<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Cedar Boost">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#E01414"/>
      <stop offset="100%" stop-color="#A00000"/>
    </linearGradient>
    <!-- Subtle inner highlight -->
    <radialGradient id="shine" cx="38%" cy="28%" r="55%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="roundedClip">
      <rect width="100" height="100" rx="22"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Shine overlay -->
  <rect width="100" height="100" rx="22" fill="url(#shine)"/>

  <!-- Cedar tree — 3 overlapping tiers + trunk -->
  <!-- Top tier -->
  <polygon points="50,19 43,35 57,35" fill="#ffffff"/>
  <!-- Middle tier -->
  <polygon points="50,28 37,48 63,48" fill="#ffffff"/>
  <!-- Bottom tier -->
  <polygon points="50,38 29,63 71,63" fill="#ffffff"/>
  <!-- Trunk -->
  <rect x="46" y="63" width="8" height="13" rx="2" fill="#ffffff"/>

  <!-- Bottom-right boost spark — subtle -->
  <path d="M77 68 L73 78 L77 78 L71 90 L84 74 L79 74 Z"
        fill="#ffffff" opacity="0.35"/>
</svg>
