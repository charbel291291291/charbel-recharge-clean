<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary meta ── -->
    <title>Cedar Boost | Premium Digital Recharge</title>
    <meta name="description" content="Cedar Boost — the fastest digital assets & recharge hub. Top up wallets, boost social accounts, and manage game credits instantly." />
    <meta name="author" content="Cedar Boost" />
    <meta name="keywords" content="cedar boost, digital recharge, SMM panel, game top-up, wallet, Lebanon" />

    <!-- ── PWA / App meta ── -->
    <meta name="theme-color" content="#D61414" />
    <meta name="color-scheme" content="dark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Cedar Boost" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Cedar Boost" />
    <meta name="msapplication-TileColor" content="#D61414" />
    <meta name="msapplication-TileImage" content="/logo-icon.svg" />

    <!-- ── Favicon chain ── -->
    <!-- SVG favicon (modern browsers — Chrome, Firefox, Edge) -->
    <link rel="icon" href="/logo-icon.svg" type="image/svg+xml" />
    <!-- PNG fallback (Safari, older browsers) -->
    <link rel="icon" href="/cedarboost-logo.png" type="image/png" sizes="any" />
    <!-- Legacy .ico fallback -->
    <link rel="shortcut icon" href="/favicon.ico" />
    <!-- Apple Touch Icon (home screen on iOS) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/cedarboost-logo.png" />

    <!-- ── Manifest ── -->
    <link rel="manifest" href="/manifest.json" />

    <!-- ── Open Graph (social preview) ── -->
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Cedar Boost" />
    <meta property="og:title"       content="Cedar Boost | Premium Digital Recharge" />
    <meta property="og:description" content="The fastest digital assets & recharge hub — SMM, games, wallet top-ups." />
    <meta property="og:image"       content="/cedarboost-logo.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt"   content="Cedar Boost Logo" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="Cedar Boost | Premium Digital Recharge" />
    <meta name="twitter:description" content="The fastest digital assets & recharge hub." />
    <meta name="twitter:image"       content="/cedarboost-logo.png" />
    <meta name="twitter:image:alt"   content="Cedar Boost Logo" />

    <!-- ── Preconnect for fonts ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <!-- ═══════════════════════════════════════════════
         NATIVE SPLASH SCREEN (shown before JS loads)
         Fades out once React mounts.
    ═══════════════════════════════════════════════ -->
    <div id="splash-screen" class="app-splash" aria-live="polite" aria-busy="true">
      <div class="app-splash__content">
        <!-- Orbital rings -->
        <div class="app-splash__orbit app-splash__orbit--outer"></div>
        <div class="app-splash__orbit app-splash__orbit--inner"></div>

        <!-- Logo mark (inline SVG — no extra request, instant render) -->
        <svg
          class="app-splash__logo"
          viewBox="0 0 100 100"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <linearGradient id="splash-bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
              <stop offset="0%"   stop-color="#E01414"/>
              <stop offset="100%" stop-color="#A00000"/>
            </linearGradient>
            <radialGradient id="splash-shine" cx="38%" cy="28%" r="55%">
              <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.18"/>
              <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
            </radialGradient>
          </defs>
          <rect width="100" height="100" rx="22" fill="url(#splash-bg)"/>
          <rect width="100" height="100" rx="22" fill="url(#splash-shine)"/>
          <polygon points="50,19 43,35 57,35" fill="#ffffff"/>
          <polygon points="50,28 37,48 63,48" fill="#ffffff"/>
          <polygon points="50,38 29,63 71,63" fill="#ffffff"/>
          <rect x="46" y="63" width="8" height="13" rx="2" fill="#ffffff"/>
          <path d="M77 68 L73 78 L77 78 L71 90 L84 74 L79 74 Z" fill="#ffffff" opacity="0.30"/>
        </svg>

        <!-- Brand name -->
        <div class="app-splash__wordmark">
          <span class="app-splash__name brand-header-3d-splash">CEDAR BOOST</span>
          <span class="app-splash__tagline">PREMIUM HUB</span>
        </div>

        <!-- Loading dots -->
        <div class="app-splash__dots">
          <span></span><span></span><span></span>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
